<body>

<form method="POST" id="saveForm">

<div class="topbar">

    <div class="top-left">

<div class="main">

<script src="https://unpkg.com/monaco-editor@0.44.0/min/vs/loader.js"></script>

<script>

require.config({
    paths:{
        vs:"https://unpkg.com/monaco-editor@0.44.0/min/vs"
    }
});

let editor;

let pressTimer;

require(["vs/editor/editor.main"], function(){

    monaco.languages.register({
        id:"btr"
    });

    monaco.languages.setMonarchTokensProvider("btr",{
        tokenizer:{
            root:[
                [/\b(if|else|for|while|function|return|wait|on|btr)\b/,"keyword"],
                [/\b(sendMessage|get|set|reply)\b/,"function"],
                [/".*?"/,"string"],
                [/\d+/,"number"]
            ]
        }
    });

    monaco.editor.defineTheme("botroidTheme",{

        base:"vs-dark",

        inherit:true,

        rules:[

            {
                token:"keyword",
                foreground:"c084fc"
            },

            {
                token:"function",
                foreground:"22c55e"
            },

            {
                token:"string",
                foreground:"facc15"
            },
            
            {
                token:"number",
                foreground:"22d3ee"
            }

        ],

        colors:{
            
            "editor.background":"#050816",
            
            "editorGhostText.foreground":"#ef4444",
            "editorGhostText.background":"#00000000",
            
            "editorSuggestWidget.selectedIconForeground":"#ef4444",
            "editorSuggestWidget.focusHighlightForeground":"#ef4444",
            
            "editorSuggestWidget.foreground":"#ef4444",
            "editorSuggestWidget.highlightForeground":"#ef4444",
            "editorSuggestWidget.selectedForeground":"#ef4444"
        }
    });

    editor =
    monaco.editor.create(

        document.getElementById("editor"),

        {

            value: "hello",

            language:"btr",

            theme:"botroidTheme",

            automaticLayout:true,

            minimap:{
                enabled:window.innerWidth > 768
            },

            fontSize:
            window.innerWidth <= 768
            ? 13
            : 15,

            lineHeight:26,

            smoothScrolling:true,

            roundedSelection:true,

            scrollBeyondLastLine:false,
            
            selectionClipboard:true,
            
            multiCursorModifier:"ctrlCmd",
            
            suggest:{
                preview:false
            },

            inlineSuggest:{
                enabled:false
            }
        
        }
    );

    editor.onDidChangeModelContent(()=>{

        document
        .getElementById("statusbar")
        .innerHTML =
        "Editing...";
    });
    
/*
|--------------------------------------------------------------------------
| MOBILE COPY SUPPORT
|--------------------------------------------------------------------------
*/

const editorElement =
document.getElementById("editor");

/*
|--------------------------------------------------------------------------
| LONG PRESS = SELECT ALL
|--------------------------------------------------------------------------
*/

editorElement.addEventListener(

    "touchstart",

    function(){

        pressTimer =
        setTimeout(function(){

            editor.focus();

            editor.setSelection(

                new monaco.Range(

                    1,
                    1,

                    editor.getModel().getLineCount(),

                    editor.getModel().getLineMaxColumn(

                        editor.getModel().getLineCount()

                    )

                )

            );

            document
            .getElementById("statusbar")
            .innerHTML =
            "Selected All";

        },900);

    },

    {
        passive:true
    }

);

/*
|--------------------------------------------------------------------------
| STOP LONG PRESS
|--------------------------------------------------------------------------
*/

editorElement.addEventListener(

    "touchend",

    function(){

        clearTimeout(pressTimer);

    },

    {
        passive:true
    }

);

/*
|--------------------------------------------------------------------------
| DOUBLE TAP = SELECT WORD
|--------------------------------------------------------------------------
*/

let lastTap = 0;

editorElement.addEventListener(

    "touchend",

    function(){

        const now = Date.now();

        if(now - lastTap < 300){

            editor.focus();

            const position =
            editor.getPosition();

            const model =
            editor.getModel();

            const word =
            model.getWordAtPosition(position);

            if(word){

                editor.setSelection(

                    new monaco.Range(

                        position.lineNumber,

                        word.startColumn,

                        position.lineNumber,

                        word.endColumn

                    )

                );

                document
                .getElementById("statusbar")
                .innerHTML =
                "Word Selected";
            }
        }

        lastTap = now;

    },

    {
        passive:true
    }

);

/*
|--------------------------------------------------------------------------
| NATIVE MOBILE COPY
|--------------------------------------------------------------------------
*/

editor.updateOptions({

    copyWithSyntaxHighlighting:false,

    emptySelectionClipboard:true,

    contextmenu:true,

    quickSuggestions:true
});





editorElement.addEventListener(

    "touchend",

    function(){

        clearTimeout(pressTimer);

    }

);

});

/*
|--------------------------------------------------------------------------
| FORMAT
|--------------------------------------------------------------------------
*/

function formatCode(){

    let code =
    editor.getValue();

    /*
    |--------------------------------------------------------------------------
    | CLEAN EXTRA SPACES
    |--------------------------------------------------------------------------
    */

    code =
    code.replace(/\r/g,'');

    code =
    code.replace(/[ \t]+\n/g,'\n');

    code =
    code.replace(/\n{3,}/g,"\n\n");

    /*
    |--------------------------------------------------------------------------
    | FORMAT SYMBOLS
    |--------------------------------------------------------------------------
    */

    code =
    code.replace(/\s*\{\s*/g," {\n");

    code =
    code.replace(/\s*\}\s*/g,"\n}\n");

    code =
    code.replace(/;\s*/g,";\n");

    /*
    |--------------------------------------------------------------------------
    | SPLIT LINES
    |--------------------------------------------------------------------------
    */

    let lines =
    code.split("\n");

    let formatted = [];

    let indent = 0;

    lines.forEach(line=>{

        line =
        line.trim();

        /*
        |--------------------------------------------------------------------------
        | SKIP EMPTY LINES
        |--------------------------------------------------------------------------
        */

        if(line === ''){
            return;
        }

        /*
        |--------------------------------------------------------------------------
        | BEFORE }
        |--------------------------------------------------------------------------
        */

        if(line.startsWith("}")){
            indent--;
        }

        /*
        |--------------------------------------------------------------------------
        | ADD LINE
        |--------------------------------------------------------------------------
        */

        formatted.push(

            "    ".repeat(
                Math.max(indent,0)
            ) +
            line

        );

        /*
        |--------------------------------------------------------------------------
        | AFTER {
        |--------------------------------------------------------------------------
        */

        if(line.endsWith("{")){
            indent++;
        }

    });

    /*
    |--------------------------------------------------------------------------
    | FINAL OUTPUT
    |--------------------------------------------------------------------------
    */

    editor.setValue(
        formatted.join("\n")
    );

    document
    .getElementById("statusbar")
    .innerHTML =
    "Code formatted";
}

/*
|--------------------------------------------------------------------------
| SAVE
|--------------------------------------------------------------------------
*/

function prepareSave(){

    document
    .getElementById("hiddenCode")
    .value =
    editor.getValue();

    document
    .getElementById("statusbar")
    .innerHTML =
    "Saving...";
}

</script>

</body>
